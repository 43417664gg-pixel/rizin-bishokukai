<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>大会予想｜RIZIN美食会予想</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260719103824">
</head>
<body>
<div id="app-header"></div>
<div id="sticky-cd"></div>
<div class="wrap" id="main"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=20260719103824"></script>
<script src="js/techniques.js?v=20260719103824"></script>
<script src="js/demo-data.js?v=20260719103824"></script>
<script src="js/api.js?v=20260719103824"></script>
<script src="js/app.js?v=20260719103824"></script>
<script>
let EV, PHASE, FIGHTS, FMAP, MEMBERS, myPreds = {}, allPreds = [];
let drafts = {};              // 決定前の編集中の選択（ローカルのみ）
const editing = new Set();    // 「編集」で開き直した試合ID

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove("show"), 1500);
}

async function load() {
  if (!requireMember()) return;
  await renderHeader("home");
  const id = qp("id");
  EV = id ? await DB.getEvent(id) : null;
  if (!EV) { document.getElementById("main").innerHTML = "<p class='page-sub'>大会が見つかりません。</p>"; return; }
  PHASE = eventPhase(EV);
  FIGHTS = (await DB.listFights(EV.id)).sort((a, b) =>
    (a.segment === b.segment) ? b.order_no - a.order_no : (a.segment === "main" ? -1 : 1));
  FMAP = fighterMap(await DB.listFighters());
  MEMBERS = await DB.listMembers();
  const fightIds = FIGHTS.map(f => f.id);
  if (PHASE === "locked" || PHASE === "finished" || isOpenBook(EV)) {
    allPreds = await DB.listPredictions({ fightIds });
  } else {
    allPreds = await DB.listPredictions({ fightIds, memberId: getMemberId() });
  }
  myPreds = {};
  for (const p of allPreds.filter(p => p.member_id === getMemberId())) myPreds[p.fight_id] = p;
  render();
}

function fightLabel(f) {
  const no = f.segment === "opening" ? `OPENING 第${f.order_no}試合` : `第${f.order_no}試合`;
  return `<span class="fno">${no}</span>
    ${f.title_label ? `<span class="title-label">${esc(f.title_label)}</span>` : ""}
    <span>${esc(f.weight_class || "")}</span>`;
}

// 選手名から名鑑へ飛ぶリンク行
function profileLinks(f) {
  const f1 = FMAP[f.fighter1_id], f2 = FMAP[f.fighter2_id];
  return `
    <div class="profile-links">
      <a href="fighter.html?id=${f.fighter1_id}">${esc(f1?.name)} の名鑑 ›</a>
      <a href="fighter.html?id=${f.fighter2_id}">${esc(f2?.name)} の名鑑 ›</a>
    </div>`;
}

// ---------- 予想UI（受付中） ----------
// 保存済み＆編集中でなければ「確定ビュー」、それ以外は「選択ビュー（決定ボタン付き）」
function predictCard(f) {
  const saved = myPreds[f.id];
  if (saved && !editing.has(f.id)) return confirmedCard(f, saved);
  const p = drafts[f.id] || (saved ? { ...saved } : {});
  const f1 = FMAP[f.fighter1_id], f2 = FMAP[f.fighter2_id];
  const methodChips = p.winner_id ? `
    <div class="chips">
      <span class="clabel">決まり手 — ラウンドまで揃えば“ピタリ”</span>
      ${METHODS.map(m => `<button class="chip ${p.method === m.id ? "sel" : ""}"
        onclick="setDraft('${f.id}','method','${m.id}')">${m.label}</button>`).join("")}
    </div>` : "";
  const roundChips = p.winner_id && p.method && p.method !== "DEC" ? `
    <div class="chips">
      <span class="clabel">ラウンド — 当てて“ピタリ”</span>
      ${Array.from({ length: f.rounds || 3 }, (_, i) => i + 1).map(r =>
        `<button class="chip ${Number(p.round) === r ? "sel" : ""}"
          onclick="setDraft('${f.id}','round',${r})">${r}R</button>`).join("")}
    </div>` : "";
  const techSelect = p.winner_id && p.method && p.method !== "DEC" ? `
    <div class="chips">
      <span class="clabel">フィニッシュ技 — 極めれば“あらます”</span>
      <select class="tech-select" onchange="setDraft('${f.id}','technique',this.value)">
        <option value="">— 狙わない —</option>
        ${techsFor(p.method).map(t =>
          `<option value="${t.id}" ${p.technique === t.id ? "selected" : ""}>${t.label}</option>`).join("")}
      </select>
    </div>` : "";
  return `
    <div class="fight-card" id="fc_${f.id}">
      ${f.image_url ? `<div class="banner"><img src="${esc(f.image_url)}" alt="" loading="lazy"></div>` : ""}
      <div class="fight-label">${fightLabel(f)}</div>
      <div class="vs-row">
        <button class="corner-btn c1 ${p.winner_id === f.fighter1_id ? "sel" : ""}"
          onclick="setDraft('${f.id}','winner_id','${f.fighter1_id}')"><small>RED</small>${esc(f1?.name)}</button>
        <span class="vs-mark">VS</span>
        <button class="corner-btn c2 ${p.winner_id === f.fighter2_id ? "sel" : ""}"
          onclick="setDraft('${f.id}','winner_id','${f.fighter2_id}')"><small>BLUE</small>${esc(f2?.name)}</button>
      </div>
      ${profileLinks(f)}
      ${methodChips}${roundChips}${techSelect}
      <div class="confirm-bar">
        <button class="btn decide" ${p.winner_id ? "" : "disabled"} onclick="confirmPred('${f.id}')">この予想で決定</button>
        ${saved ? `<button class="btn ghost" onclick="cancelEdit('${f.id}')">キャンセル</button>` : ""}
      </div>
    </div>`;
}

// 確定ビュー：自分の予想サマリー＋編集／取り消し
function confirmedCard(f, p) {
  const f1 = FMAP[f.fighter1_id], f2 = FMAP[f.fighter2_id];
  const detail = [p.method ? METHOD_LABEL[p.method] : null,
    p.round ? `${p.round}R` : null,
    p.technique ? TECH_LABEL[p.technique] : null].filter(Boolean).join("・");
  const tier = p.technique ? "あらます狙い"
    : (p.method && (p.method === "DEC" || p.round)) ? "ピタリ狙い" : "的中狙い";
  return `
    <div class="fight-card confirmed" id="fc_${f.id}">
      ${f.image_url ? `<div class="banner"><img src="${esc(f.image_url)}" alt="" loading="lazy"></div>` : ""}
      <div class="fight-label">${fightLabel(f)}</div>
      <div class="vs-row">
        <div class="corner-btn c1 ${p.winner_id === f.fighter1_id ? "sel" : ""}"><small>RED</small>${esc(f1?.name)}</div>
        <span class="vs-mark">VS</span>
        <div class="corner-btn c2 ${p.winner_id === f.fighter2_id ? "sel" : ""}"><small>BLUE</small>${esc(f2?.name)}</div>
      </div>
      ${profileLinks(f)}
      <div class="my-pick">
        <span class="mp-check">✓</span>
        <span class="mp-body"><b>${esc(FMAP[p.winner_id]?.name)}</b>${detail ? `　${esc(detail)}` : ""}
          <span class="mp-max">${tier}</span></span>
      </div>
      <div class="confirm-bar">
        <button class="btn ghost" onclick="startEdit('${f.id}')">編集</button>
        <button class="clear-btn" onclick="clearPred('${f.id}')">予想を取り消す</button>
      </div>
    </div>`;
}

// ---------- 受付前（計量待ち）：カードだけ見せる ----------
function previewCard(f) {
  const f1 = FMAP[f.fighter1_id], f2 = FMAP[f.fighter2_id];
  return `
    <div class="fight-card" id="fc_${f.id}">
      ${f.image_url ? `<div class="banner"><img src="${esc(f.image_url)}" alt="" loading="lazy"></div>` : ""}
      <div class="fight-label">${fightLabel(f)}</div>
      <div class="vs-row">
        <div class="corner-btn c1 disabled"><small>RED</small>${esc(f1?.name)}</div>
        <span class="vs-mark">VS</span>
        <div class="corner-btn c2 disabled"><small>BLUE</small>${esc(f2?.name)}</div>
      </div>
      ${profileLinks(f)}
      <div class="fight-foot"><span class="save-note">計量終了後に予想開始</span></div>
    </div>`;
}

// 選択はローカルに貯めるだけ。「決定」で初めて保存される
function setDraft(fightId, key, val) {
  const base = drafts[fightId] || (myPreds[fightId] ? { ...myPreds[fightId] } : {});
  const next = { ...base, member_id: getMemberId(), fight_id: fightId };
  if (key === "winner_id") {
    if (next.winner_id === val) return;
    next.winner_id = val;
  } else if (next[key] === val) {
    next[key] = null; // 同じチップ再タップで解除
    if (key === "method") { next.round = null; next.technique = null; }
  } else {
    next[key] = val || null;
    if (key === "method") { next.round = null; next.technique = null; }
  }
  drafts[fightId] = next;
  replaceCard(fightId);
}

async function confirmPred(fightId) {
  const p = drafts[fightId] || myPreds[fightId];
  if (!p || !p.winner_id) return;
  try {
    await DB.upsertPrediction({
      member_id: getMemberId(), fight_id: fightId,
      winner_id: p.winner_id, method: p.method || null,
      round: p.round || null, technique: p.technique || null,
    });
    myPreds[fightId] = { ...p, member_id: getMemberId(), fight_id: fightId };
    delete drafts[fightId];
    editing.delete(fightId);
    replaceCard(fightId);
    await refreshMatrix();
    toast("予想を決定した ✓");
  } catch (e) { toast(e.message || "保存できなかった"); }
}

function startEdit(fightId) {
  editing.add(fightId);
  drafts[fightId] = { ...myPreds[fightId] };
  replaceCard(fightId);
}

function cancelEdit(fightId) {
  editing.delete(fightId);
  delete drafts[fightId];
  replaceCard(fightId);
}

async function clearPred(fightId) {
  await DB.deletePrediction(getMemberId(), fightId);
  delete myPreds[fightId];
  delete drafts[fightId];
  editing.delete(fightId);
  replaceCard(fightId);
  await refreshMatrix();
  toast("取り消した");
}

// オープンブック（締切なし）時、保存後にALL PICKSマトリクスを即時更新
async function refreshMatrix() {
  const box = document.getElementById("matrix-section");
  if (!box || !(isOpenBook(EV) || PHASE === "locked" || PHASE === "finished")) return;
  allPreds = await DB.listPredictions({ fightIds: FIGHTS.map(f => f.id) });
  box.innerHTML = allPicksMatrix();
}

function replaceCard(fightId) {
  const f = FIGHTS.find(x => x.id === fightId);
  const el = document.getElementById("fc_" + fightId);
  const tmp = document.createElement("div");
  tmp.innerHTML = (PHASE === "locked" || PHASE === "finished") ? resultCard(f)
    : PHASE === "before_open" ? previewCard(f) : predictCard(f);
  el.replaceWith(tmp.firstElementChild);
}

// ---------- 答え合わせUI（締切後） ----------
function resultCard(f) {
  const f1 = FMAP[f.fighter1_id], f2 = FMAP[f.fighter2_id];
  const decided = f.winner_id && f.result_method;
  let resultBox = `<div class="result-box waiting"><span class="rline">結果待ち</span></div>`;
  if (decided) {
    if (f.result_method === "DRAW" || f.result_method === "NC") {
      resultBox = `<div class="result-box"><span class="rline">${METHOD_LABEL[f.result_method]}</span>（集計対象外）</div>`;
    } else {
      const w = FMAP[f.winner_id];
      resultBox = `<div class="result-box">
        <div class="rline"><span class="win">🏆 ${esc(w?.name)}</span>　${METHOD_LABEL[f.result_method] || ""}
          ${f.result_method !== "DEC" && f.result_round ? ` ${f.result_round}R` : ""}
          ${f.result_technique ? `／${TECH_LABEL[f.result_technique] || esc(f.result_technique)}` : ""}</div>
      </div>`;
    }
  }
  const preds = allPreds.filter(p => p.fight_id === f.id)
    .map(p => ({ p, m: MEMBERS.find(m => m.id === p.member_id), s: decided ? scoreFight(p, f) : null }))
    .sort((a, b) => (b.s?.pts || 0) - (a.s?.pts || 0));
  const predRows = preds.length ? preds.map(({ p, m, s }) => {
    const detail = [FMAP[p.winner_id]?.name,
      p.method ? METHOD_LABEL[p.method] : null,
      p.round ? `${p.round}R` : null,
      p.technique ? TECH_LABEL[p.technique] : null].filter(Boolean).join("・");
    if (!s || !s.counted) return `<div class="pred-row"><span class="pwho">${esc(m?.name)}</span><span class="pdetail">${esc(detail)}</span></div>`;
    const tier = s.aramasu ? `<span class="ptier aramasu">🎯あらます!!</span>`
      : s.pitari ? `<span class="ptier pitari">ピタリ!</span>`
      : s.winnerHit ? `<span class="ptier">的中</span>` : "";
    return `<div class="pred-row ${s.winnerHit ? "hit" : "miss"}">
      <span class="hitmark">${s.winnerHit ? "○" : "×"}</span>
      <span class="pwho">${esc(m?.name)}</span>
      <span class="pdetail">${esc(detail)}</span>
      ${tier}
    </div>`;
  }).join("") : `<div class="pred-row"><span class="pdetail">予想なし</span></div>`;
  return `
    <div class="fight-card" id="fc_${f.id}">
      ${f.image_url ? `<div class="banner"><img src="${esc(f.image_url)}" alt="" loading="lazy"></div>` : ""}
      <div class="fight-label">${fightLabel(f)}</div>
      <div class="vs-row">
        <div class="corner-btn c1 ${decided && f.winner_id === f.fighter1_id ? "sel" : ""}"><small>RED</small>${esc(f1?.name)}</div>
        <span class="vs-mark">VS</span>
        <div class="corner-btn c2 ${decided && f.winner_id === f.fighter2_id ? "sel" : ""}"><small>BLUE</small>${esc(f2?.name)}</div>
      </div>
      ${profileLinks(f)}
      ${resultBox}
      ${predRows}
    </div>`;
}

// ---------- 全員の予想マトリクス（締切後） ----------
function allPicksMatrix() {
  const activeMembers = MEMBERS.filter(m => allPreds.some(p => p.member_id === m.id));
  if (!activeMembers.length) return "";
  const ordered = FIGHTS;  // renderと同じ並び（メイン降順→オープニング降順）
  const rows = ordered.map(f => {
    const no = f.segment === "opening" ? `OP${f.order_no}` : `第${f.order_no}`;
    const decided = f.winner_id && f.result_method && !["DRAW", "NC"].includes(f.result_method);
    const cells = activeMembers.map(m => {
      const p = allPreds.find(x => x.fight_id === f.id && x.member_id === m.id);
      if (!p) return `<td class="mx-cell none">—</td>`;
      const corner = p.winner_id === f.fighter1_id ? "c1" : "c2";
      const hitCls = decided ? (p.winner_id === f.winner_id ? " hit" : " miss") : "";
      const sub = [p.method ? METHOD_LABEL[p.method] : null, p.round ? `${p.round}R` : null]
        .filter(Boolean).join(" ");
      const s = decided ? scoreFight(p, f) : null;
      const mark = s?.aramasu ? " 🎯あらます" : s?.pitari ? " ピタリ" : "";
      return `<td class="mx-cell ${corner}${hitCls}">
        <span class="mx-name">${esc(FMAP[p.winner_id]?.name || "")}</span>
        ${sub || mark ? `<span class="mx-sub">${esc(sub)}${mark}</span>` : ""}
      </td>`;
    }).join("");
    return `<tr><th class="mx-fight">${no}</th>${cells}</tr>`;
  }).join("");
  return `
    <div class="section-label">ALL PICKS</div>
    <div class="matrix-wrap">
      <table class="matrix">
        <tr><th></th>${activeMembers.map(m => `<th class="mx-member">${esc(m.name)}</th>`).join("")}</tr>
        ${rows}
      </table>
    </div>
    <p class="page-sub" style="margin-top:6px">赤＝RED側・青＝BLUE側の予想。結果が出ると○×で色分け。</p>`;
}

// ---------- 結果発表（finished時の大会サマリー） ----------
function eventSummary() {
  const rows = computeLeaderboard(MEMBERS, FIGHTS, allPreds).filter(r => r.answered > 0);
  if (!rows.length) return "";
  return `
    <div class="summary-box">
      <div class="en-label gold">FINAL RESULT</div>
      <div class="summary-title">この大会の成績</div>
      ${rows.map((r, i) => `
        <div class="summary-row ${i === 0 ? "champ" : ""}">
          <span class="srank">${i + 1}</span>
          <span class="sname">${esc(r.member.name)}${i === 0 ? "　👑" : ""}</span>
          <span class="srate">${fmtRate(r.rate)}</span>
          <span class="ssub">${r.hits}/${r.decided}的中${r.pitari ? `・ピタリ${r.pitari}` : ""}${r.aramasu ? `・あらます${r.aramasu}` : ""}</span>
        </div>`).join("")}
    </div>`;
}

function render() {
  const main = FIGHTS.filter(f => f.segment === "main");
  const op = FIGHTS.filter(f => f.segment === "opening");
  const card = (PHASE === "locked" || PHASE === "finished") ? resultCard
    : PHASE === "before_open" ? previewCard : predictCard;
  const days = daysToEvent(EV);
  const openBook = isOpenBook(EV);
  const subText = openBook ? "締切なし・いつでも予想＆編集OK。みんなの予想も公開中。"
    : {
      before_open: "カード公開中。計量終了後に予想が開く。",
      open: "全メンバーの予想は締切後に公開。",
      locked: "締切済み。全員の予想を公開中——あとは試合を待つだけ。",
      finished: "結果確定・答え合わせ",
    }[PHASE];
  document.getElementById("main").innerHTML = `
    <div class="en-label">${PHASE === "finished" ? "RESULT" : "FIGHT CARD"}</div>
    <h1 class="page-title">${esc(EV.name)}</h1>
    <p class="page-sub">${fmtDate(EV.event_date)}　${subText}</p>
    ${PHASE === "finished" ? eventSummary() : ""}
    <div id="matrix-section">${PHASE === "locked" || PHASE === "finished" || openBook ? allPicksMatrix() : ""}</div>
    ${main.length ? `<div class="section-label">MAIN CARD</div>` : ""}
    ${main.map(card).join("")}
    ${op.length ? `<div class="section-label">OPENING FIGHTS</div>` : ""}
    ${op.map(card).join("")}`;
  // 締切ありの受付中のみカウントダウンをスティッキー表示（締切なし大会は非表示）
  const sc = document.getElementById("sticky-cd");
  if (PHASE === "open" && !openBook) {
    sc.innerHTML = `
      <div class="countdown-bar sticky">
        <div class="cd-left">
          <span class="cd-label">予想締切まで</span>
          <span class="cd-timer" id="cd_main">--:--:--</span>
        </div>
        ${days !== null && days >= 0 ? `<div class="cd-days"><b>${days === 0 ? "本日" : "あと" + days + "日"}</b><span>大会${days === 0 ? "開催" : "まで"}</span></div>` : ""}
      </div>`;
    startCountdown(document.getElementById("cd_main"), EV.lock_at, () => location.reload());
  } else sc.innerHTML = "";
}

load();
</script>
</body>
</html>
