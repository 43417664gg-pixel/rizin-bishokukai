<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>選手名鑑｜RIZIN美食会予想</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260720213214">
</head>
<body>
<div id="app-header"></div>
<div class="wrap" id="main"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=20260720213214"></script>
<script src="js/techniques.js?v=20260720213214"></script>
<script src="js/demo-data.js?v=20260720213214"></script>
<script src="js/api.js?v=20260720213214"></script>
<script src="js/app.js?v=20260720213214"></script>
<script>
// このポータルで扱った試合から選手ごとの戦績を組み立てる（サイト内完結STATS）
function buildStats(fighterId, fights) {
  const mine = fights.filter(f =>
    (f.fighter1_id === fighterId || f.fighter2_id === fighterId) && f.winner_id && f.result_method);
  let w = 0, l = 0, d = 0, finishes = {};
  for (const f of mine) {
    if (f.result_method === "DRAW" || f.result_method === "NC") { d++; continue; }
    if (f.winner_id === fighterId) {
      w++;
      const key = f.result_technique ? (TECH_LABEL[f.result_technique] || f.result_technique)
        : METHOD_LABEL[f.result_method];
      finishes[key] = (finishes[key] || 0) + 1;
    } else l++;
  }
  return { w, l, d, finishes, fights: mine };
}

// 選手写真＝公式VSバナーの左半分（RED）or右半分（BLUE）を切り出す
function photoOf(fighterId, fights) {
  const f = fights.filter(x => x.image_url &&
    (x.fighter1_id === fighterId || x.fighter2_id === fighterId))
    .sort((a, b) => (b.event_id > a.event_id ? 1 : -1))[0];
  if (!f) return null;
  return { img: f.image_url, side: f.fighter1_id === fighterId ? "left" : "right" };
}
function photoDiv(ph, cls) {
  if (!ph) return "";
  return `<div class="${cls} ${ph.side}" style="background-image:url('${esc(ph.img)}')"></div>`;
}

// 階級＝直近の試合の表記を使う
function weightOf(fighterId, fights) {
  const f = fights.filter(x => x.weight_class &&
    (x.fighter1_id === fighterId || x.fighter2_id === fighterId))[0];
  return f ? f.weight_class : "";
}

async function load() {
  await renderHeader("fighter");
  const [fighters, fights, events] = await Promise.all([DB.listFighters(), DB.listFights(), DB.listEvents()]);
  const id = qp("id");
  if (id) renderDetail(fighters.find(f => f.id === id), fighters, fights, events);
  else renderList(fighters, fights);
}

let LIST_ROWS = [];   // 検索で絞り込む元データ

function cardHtml({ f, s, ph }, i) {
  const wc = f._wc;
  return `
    <a class="meikan-card" href="fighter.html?id=${f.id}" style="--d:${Math.min(i, 11) * 40}ms">
      ${f.highlight_url
        ? `<div class="mphoto portrait"><img src="${esc(f.highlight_url)}" alt="${esc(f.name)}" loading="lazy"></div>`
        : (ph ? photoDiv(ph, "mphoto") : `<div class="mphoto none">${esc(f.name.slice(0, 1))}</div>`)}
      <div class="mbody">
        <div class="mname">${esc(f.name)}</div>
        <div class="mmeta">
          ${wc ? `<span>${esc(wc)}</span>` : ""}
          <span>${f.rec_w != null
            ? `${f.rec_w}勝${f.rec_l != null ? f.rec_l + "敗" : ""}${f.rec_d ? f.rec_d + "分" : ""}`
            : (s.w + s.l + s.d ? `${s.w}勝${s.l}敗${s.d ? s.d + "分" : ""}` : "")}</span>
        </div>
        ${f.nickname ? `<div class="malias">${esc(f.nickname)}</div>` : ""}
        <div class="mtags">
          ${isChampion(f) ? `<span class="mchamp">CHAMPION</span>` : ""}
          ${f.backbone ? `<span class="mbackbone">${esc(f.backbone)}</span>` : ""}
          ${f.stance ? `<span class="mstance">${esc(f.stance)}</span>` : ""}
        </div>
      </div>
    </a>`;
}

// 検索：名前・異名・所属・バックボーン・階級のどれかに引っかかれば表示
function matchQuery(row, q) {
  if (!q) return true;
  const f = row.f;
  const hay = [f.name, f.nickname, f.team, f.backbone, f.origin, f._wc]
    .filter(Boolean).join(" ").toLowerCase();
  return q.toLowerCase().split(/\s+/).filter(Boolean).every(t => hay.includes(t));
}

function renderMeikan() {
  const q = (document.getElementById("fi_search")?.value || "").trim();
  const hit = LIST_ROWS.filter(r => matchQuery(r, q));

  // 王者は階級を問わず最上段に置く（Gaku方針）
  const champs = hit.filter(r => isChampion(r.f));
  const rest = hit.filter(r => !isChampion(r.f));

  const groups = WEIGHT_ORDER
    .map(name => ({ name, rows: rest.filter(r => r.f._wc === name) }))
    .filter(g => g.rows.length);

  const section = (label, rows, cls = "") => `
    <div class="section-label ${cls}">${esc(label)}<span class="sec-count">${rows.length}</span></div>
    <div class="meikan-grid">${rows.map(cardHtml).join("")}</div>`;

  const body = !hit.length
    ? `<p class="page-sub" style="margin-top:20px">「${esc(q)}」に一致する選手はいません。</p>`
    : (champs.length ? section("CHAMPION", champs, "champ") : "") +
      groups.map(g => section(g.name, g.rows)).join("");

  document.getElementById("meikan-body").innerHTML = body;
}

function renderList(fighters, fights) {
  LIST_ROWS = fighters.map(f => {
    // 試合から階級を引く。出場歴が無い王者は belt から取る
    const wc = weightOf(f.id, fights);
    f._wc = wc ? weightClassName(wc) : (weightFromBelt(f) || "階級未設定");
    return { f, s: buildStats(f.id, fights), ph: photoOf(f.id, fights) };
  });
  // 階級内は 王者 → 名前順
  LIST_ROWS.sort((a, b) => (isChampion(b.f) - isChampion(a.f)) ||
    a.f.name.localeCompare(b.f.name, "ja"));

  document.getElementById("main").innerHTML = `
    <div class="en-label">FIGHTERS</div>
    <h1 class="page-title">選手名鑑</h1>
    <p class="page-sub">このポータルで扱った大会の戦績を蓄積。大会を重ねるほど名鑑が濃くなる。</p>
    <div class="fi-search">
      <input id="fi_search" type="search" placeholder="選手名・異名・所属・階級で検索"
             oninput="renderMeikan()" autocomplete="off">
    </div>
    <div id="meikan-body"></div>`;
  renderMeikan();
}

// FIGHT / 普段着 の写真切替
function switchPhoto(btn) {
  document.getElementById("hero-photo").src = btn.dataset.src;
  btn.parentElement.querySelectorAll("button").forEach(b => b.classList.toggle("on", b === btn));
}

// キャリア戦績：直近3試合は常時表示、残りは開閉式
function careerHistoryHtml(fighter) {
  const h = fighter.history || [];
  if (!h.length) return "";
  const row = (x) => `
    <div class="cr-row ${x.r === "W" ? "w" : x.r === "L" ? "l" : "n"}">
      <span class="cr-res">${x.r === "W" ? "○" : x.r === "L" ? "×" : x.r === "D" ? "△" : "−"}</span>
      <span class="cr-date">${esc(x.d || "")}</span>
      <span class="cr-opp">vs ${esc(x.opp)}</span>
      <span class="cr-how">${esc(x.how || "")}</span>
    </div>`;
  const first = h.slice(0, 3), rest = h.slice(3);
  return `
    <div class="section-label">戦績（直近）</div>
    <div class="career-list">
      ${first.map(row).join("")}
      ${rest.length ? `
      <details class="career-more">
        <summary>過去の戦績も見る（あと${rest.length}試合）</summary>
        ${rest.map(row).join("")}
      </details>` : ""}
    </div>`;
}

function renderDetail(fighter, fighters, fights, events) {
  if (!fighter) { document.getElementById("main").innerHTML = "<p class='page-sub'>選手が見つかりません。</p>"; return; }
  const FMAP = fighterMap(fighters);
  const EMAP = Object.fromEntries(events.map(e => [e.id, e]));
  const s = buildStats(fighter.id, fights);
  const ph = photoOf(fighter.id, fights);
  const wc = weightOf(fighter.id, fights);
  const upcoming = fights.filter(f =>
    (f.fighter1_id === fighter.id || f.fighter2_id === fighter.id) && !(f.winner_id && f.result_method));
  const historyHtml = (list, decided) => list
    .sort((a, b) => (EMAP[b.event_id]?.event_date || "").localeCompare(EMAP[a.event_id]?.event_date || ""))
    .map(f => {
      const opp = FMAP[f.fighter1_id === fighter.id ? f.fighter2_id : f.fighter1_id];
      const ev = EMAP[f.event_id];
      let resLine = `<span class="hmeta">結果待ち</span>`;
      if (decided) {
        const isDraw = f.result_method === "DRAW" || f.result_method === "NC";
        const won = f.winner_id === fighter.id;
        resLine = `<span class="hresult ${won ? "win" : "lose"}">${isDraw ? METHOD_LABEL[f.result_method] : won ? "WIN" : "LOSE"}</span>
          <span class="hmeta">${METHOD_LABEL[f.result_method] || ""}${f.result_method !== "DEC" && f.result_round ? ` ${f.result_round}R` : ""}${f.result_technique ? `／${TECH_LABEL[f.result_technique] || esc(f.result_technique)}` : ""}</span>`;
      }
      return `
      <div class="history-item">
        ${f.image_url ? `<img src="${esc(f.image_url)}" alt="" loading="lazy">` : ""}
        <div class="hbody">
          <div>vs ${esc(opp?.name)}　<span class="hmeta">${esc(f.weight_class || "")}</span></div>
          <div>${resLine}</div>
          <div class="hmeta">${esc(ev?.name || "")}　${fmtDate(ev?.event_date)}</div>
        </div>
      </div>`;
    }).join("");
  const finishList = Object.entries(s.finishes).sort((a, b) => b[1] - a[1])
    .map(([k, v]) => `${k}×${v}`).join("、");
  // 通算戦績（報道ベース）とフィニッシュ内訳グラフ
  const hasRec = fighter.rec_w != null;
  const recText = hasRec
    ? `${fighter.rec_w}勝${fighter.rec_l != null ? fighter.rec_l + "敗" : ""}${fighter.rec_d ? fighter.rec_d + "分" : ""}`
    : null;
  let finBars = "";
  const ko = fighter.rec_ko, sub = fighter.rec_sub, dec = fighter.rec_dec;
  // 内訳が勝数と一致する（＝完全に判明している）場合だけグラフを出す。中途半端な内訳は出さない
  if (hasRec && ((ko || 0) + (sub || 0) + (dec || 0)) === fighter.rec_w && fighter.rec_w > 0) {
    const parts = [
      { label: "KO/TKO", n: ko || 0, cls: "ko" },
      { label: "一本", n: sub || 0, cls: "sub" },
      { label: "判定", n: dec || 0, cls: "dec" },
    ].filter(p => p.n > 0);
    const total = parts.reduce((a, p) => a + p.n, 0);
    const finRate = Math.round(((ko || 0) + (sub || 0)) / fighter.rec_w * 100);
    if (total > 0) {
      finBars = `
      <div class="fin-graph">
        <div class="fin-head"><span>勝利の内訳</span>${finRate !== null ? `<span class="fin-rate">フィニッシュ率 <b>${finRate}%</b></span>` : ""}</div>
        <div class="fin-bar">
          ${parts.map(p => `<div class="fin-seg ${p.cls}" style="width:${(p.n / total * 100).toFixed(1)}%"></div>`).join("")}
        </div>
        <div class="fin-legend">
          ${parts.map(p => `<span class="fin-leg ${p.cls}">${p.label} ${p.n}</span>`).join("")}
        </div>
      </div>`;
    }
  }
  document.getElementById("main").innerHTML = `
    <div class="fhero">
      ${fighter.highlight_url
        ? `<div class="fhero-portrait">
             <img id="hero-photo" src="${esc(fighter.highlight_url)}" alt="${esc(fighter.name)}">
             ${fighter.photo_casual ? `
             <div class="photo-toggle">
               <button class="on" data-src="${esc(fighter.highlight_url)}" onclick="switchPhoto(this)">FIGHT</button>
               <button data-src="${esc(fighter.photo_casual)}" onclick="switchPhoto(this)">普段着</button>
             </div>` : ""}
           </div>`
        : (ph ? photoDiv(ph, "fhero-photo") : "")}
      <div class="fhero-body">
        ${fighter.nickname ? `<div class="falias">“${esc(fighter.nickname)}”</div>` : `<div class="en-label">FIGHTER</div>`}
        <h1 class="fname-big">${esc(fighter.name)}</h1>
        ${fighter.belt ? `<div class="fbelt">🏆 ${esc(fighter.belt)}</div>` : ""}
        <div class="page-sub" style="margin-top:6px">${wc ? esc(wc) : ""}</div>
      </div>
    </div>
    ${hasRec ? `
    <div class="record-badges">
      <div class="rec-badge career"><b>${esc(recText)}</b><span>通算戦績</span></div>
    </div>` : ""}
    ${finBars}
    <div class="profile-table">
      ${ageText(fighter.birth_date) ? `<div class="pt-row"><span class="pt-k">年齢</span><span class="pt-v">${esc(ageText(fighter.birth_date))}</span></div>` : ""}
      ${fighter.backbone ? `<div class="pt-row"><span class="pt-k">バックボーン</span><span class="pt-v">${esc(fighter.backbone)}</span></div>` : ""}
      ${fighter.stance ? `<div class="pt-row"><span class="pt-k">構え</span><span class="pt-v">${esc(fighter.stance)}</span></div>` : ""}
      ${fighter.team ? `<div class="pt-row"><span class="pt-k">所属ジム</span><span class="pt-v">${esc(fighter.team)}</span></div>` : ""}
      ${fighter.origin ? `<div class="pt-row"><span class="pt-k">出身</span><span class="pt-v">${esc(fighter.origin)}</span></div>` : ""}
      ${fighter.style ? `<div class="pt-row"><span class="pt-k">ファイトスタイル</span><span class="pt-v">${esc(fighter.style)}</span></div>` : ""}
      ${fighter.career ? `<div class="pt-row"><span class="pt-k">来歴</span><span class="pt-v">${esc(fighter.career)}</span></div>` : ""}
      ${fighter.memo ? `<div class="pt-row"><span class="pt-k">今大会</span><span class="pt-v">${esc(fighter.memo)}</span></div>` : ""}
    </div>
    ${fighter.highlight_caption ? `
    <div class="section-label">HIGHLIGHT</div>
    <div class="highlight-box">
      ${ph ? photoDiv(ph, "hl-scene") : ""}
      <p class="hl-caption">${esc(fighter.highlight_caption)}</p>
    </div>` : ""}
    ${upcoming.length ? `<div class="section-label">NEXT FIGHT</div>${historyHtml(upcoming, false)}` : ""}
    ${careerHistoryHtml(fighter)}
    ${s.fights.length ? `<div class="section-label">美食会アーカイブ</div>${historyHtml(s.fights, true)}` : ""}
    ${fighter.rizin_url ? `<p class="page-sub" style="margin-top:16px"><a href="${esc(fighter.rizin_url)}" target="_blank" rel="noopener" style="text-decoration:underline">RIZIN公式の関連記事 ↗</a></p>` : ""}
    <p style="margin-top:20px"><a href="fighter.html" style="color:var(--muted);font-size:13px;text-decoration:underline">← 選手名鑑に戻る</a></p>`;
}

load();
</script>
</body>
</html>
