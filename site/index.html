<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>RIZIN美食会予想</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260720090315">
</head>
<body>
<div id="app-header"></div>
<div class="wrap" id="main"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=20260720090315"></script>
<script src="js/techniques.js?v=20260720090315"></script>
<script src="js/demo-data.js?v=20260720090315"></script>
<script src="js/api.js?v=20260720090315"></script>
<script src="js/app.js?v=20260720090315"></script>
<script>
async function renderPlayerSelect() {
  const members = await DB.listMembers();
  document.getElementById("main").innerHTML = `
    <div class="ps-hero">
      <div class="en-label">CHOOSE YOUR FIGHTER</div>
      <h1 class="page-title">誰で参戦する？</h1>
      <p class="page-sub">名前を選んでエントリー。次からは自動で入場。</p>
    </div>
    <div class="player-grid">
      ${members.map((m, i) => `
        <button class="player-tile" style="--c:${esc(m.color)};--d:${i * 70}ms" data-initial="${esc(m.name.slice(0, 1))}" onclick="choose('${m.id}')">
          <span class="entry-no">ENTRY ${String(i + 1).padStart(2, "0")}</span>
          <span class="pname">${esc(m.name)}</span>
        </button>`).join("")}
    </div>
    <div class="rules-box">
      <b>ルールは三段梯子：</b>勝者を当てて<b class="gold">的中</b>、
      決まり手＋ラウンドまで揃えば<b class="gold">ピタリ</b>、
      フィニッシュ技まで極めれば<b class="gold">あらます</b>。
      勝者を外したら全部パー。予想しない試合はノーカウント。
    </div>`;
}

function choose(id) { setMemberId(id); renderHome(); }

async function renderHome() {
  await renderHeader("home");
  // 開催日の近い順（未来→過去）に並べる
  const events = (await DB.listEvents()).sort((a, b) => {
    const fin = (e) => e.status === "finished" ? 1 : 0;
    return fin(a) - fin(b) || (a.event_date || "").localeCompare(b.event_date || "");
  });
  const rows = await Promise.all(events.map(async ev => {
    const fights = await DB.listFights(ev.id);
    const myPreds = await DB.listPredictions({ fightIds: fights.map(f => f.id), memberId: getMemberId() });
    // カード未発表の大会はCOMING SOON扱い（予想不可）
    if (!fights.length) {
      return `
        <div class="event-card soon">
          <div class="ebody">
            <div class="soon-label">COMING SOON</div>
            <div class="ename">${esc(ev.name)}</div>
            <div class="emeta">
              <span>${fmtDate(ev.event_date)}</span>
              <span class="tag before_open">対戦カード発表待ち</span>
            </div>
          </div>
        </div>`;
    }
    const phase = eventPhase(ev);
    const days = daysToEvent(ev);
    const openBook = isOpenBook(ev);
    const tag = openBook
      ? `<span class="tag open">予想受付中・締切なし</span>`
      : `<span class="tag ${phase}">${PHASE_LABEL[phase]}</span>`;
    const countdown = (phase === "open" && !openBook) ? `
      <div class="countdown-bar">
        <div class="cd-left">
          <span class="cd-label">予想締切まで</span>
          <span class="cd-timer" data-target="${ev.lock_at}">--:--:--</span>
        </div>
        ${days !== null && days >= 0 ? `<div class="cd-days"><b>${days === 0 ? "本日" : "あと" + days + "日"}</b><span>大会${days === 0 ? "開催" : "まで"}</span></div>` : ""}
      </div>` : "";
    return `
      <a class="event-card" href="event.html?id=${ev.id}">
        ${ev.poster_url ? `<img src="${esc(ev.poster_url)}" alt="">` : ""}
        <div class="ebody">
          <div class="ename">${esc(ev.name)}</div>
          <div class="emeta">
            <span>${fmtDate(ev.event_date)}</span>
            ${tag}
            <span>予想済み ${myPreds.length}/${fights.length}</span>
          </div>
        </div>
        ${countdown}
      </a>`;
  }));
  document.getElementById("main").innerHTML = `
    <div class="en-label">EVENTS</div>
    <h1 class="page-title">大会</h1>
    <p class="page-sub">カードをタップして予想。この大会は締切なし・いつでも編集OK。</p>
    ${rows.join("")}`;
  document.querySelectorAll(".cd-timer").forEach(el =>
    startCountdown(el, el.dataset.target, () => location.reload()));
}

(async () => {
  await renderHeader("home");
  if (getMemberId()) renderHome(); else renderPlayerSelect();
})();
</script>
</body>
</html>
